spring.application.name=fastcheck

# Tüm ağ arayüzlerinde dinle (LAN’daki fiziksel telefon / tablet erişimi için)
server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:h2:mem:fastcheck;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.issuer=${APP_JWT_ISSUER:fastcheck-spring}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:30}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:14}
app.jwt.secret=${APP_JWT_SECRET:change-this-user-jwt-secret-change-this-user-jwt-secret}

app.files.storage-path=${APP_FILES_STORAGE_PATH:./uploads}
app.files.public-base-url=${APP_FILES_PUBLIC_BASE_URL:http://localhost:8080/files}
spring.servlet.multipart.max-file-size=${SPRING_MULTIPART_MAX_FILE_SIZE:20MB}
spring.servlet.multipart.max-request-size=${SPRING_MULTIPART_MAX_REQUEST_SIZE:50MB}

app.fastapi.base-url=${FASTAPI_BASE_URL:http://127.0.0.1:8000}
app.fastapi.connect-timeout-seconds=${FASTAPI_CONNECT_TIMEOUT_SECONDS:10}
app.fastapi.read-timeout-seconds=${FASTAPI_READ_TIMEOUT_SECONDS:30}
app.fastapi.service-jwt.audience=${FASTAPI_SERVICE_JWT_AUDIENCE:fastcheck-ai}
app.fastapi.service-jwt.secret=${FASTAPI_SERVICE_JWT_SECRET:change-this-service-jwt-secret-change-this-service-jwt-secret}
app.fastapi.service-jwt.ttl-minutes=${FASTAPI_SERVICE_JWT_TTL_MINUTES:10}
