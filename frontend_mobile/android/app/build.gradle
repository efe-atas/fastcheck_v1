plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def releaseStoreFile = keystoreProperties["storeFile"]
    ? rootProject.file(keystoreProperties["storeFile"])
    : null
def hasReleaseKeystore = keystorePropertiesFile.exists() &&
        keystoreProperties["storeFile"] &&
    releaseStoreFile.exists()

android {
    namespace = "dev.efeatas.fastcheck"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "dev.efeatas.fastcheck"
        minSdk = Math.max(flutter.minSdkVersion, 21)
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile releaseStoreFile
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // Uses release signing when keystore.properties exists; otherwise
            // falls back to debug signing for local verification builds.
            signingConfig = hasReleaseKeystore
                    ? signingConfigs.release
                    : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
