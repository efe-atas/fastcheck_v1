services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fastcheck}
      POSTGRES_USER: ${POSTGRES_USER:-fastcheck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-net

  springboot:
    build: ./backend/fastcheck
    container_name: springboot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-fastcheck}
      DB_USERNAME: ${POSTGRES_USER:-fastcheck}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      DB_DRIVER: org.postgresql.Driver
      APP_JWT_ISSUER: ${APP_JWT_ISSUER:-fastcheck-spring}
      APP_JWT_ACCESS_TOKEN_MINUTES: ${APP_JWT_ACCESS_TOKEN_MINUTES:-30}
      APP_JWT_REFRESH_TOKEN_DAYS: ${APP_JWT_REFRESH_TOKEN_DAYS:-14}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?APP_JWT_SECRET must be set in .env}
      APP_FILES_STORAGE_PATH: /data/uploads
      APP_FILES_PUBLIC_BASE_URL: ${APP_FILES_PUBLIC_BASE_URL:-https://api.efeatas.dev/api/files}
      SPRING_MULTIPART_MAX_FILE_SIZE: ${SPRING_MULTIPART_MAX_FILE_SIZE:-20MB}
      SPRING_MULTIPART_MAX_REQUEST_SIZE: ${SPRING_MULTIPART_MAX_REQUEST_SIZE:-50MB}
      FASTAPI_BASE_URL: http://fastapi:8000
      FASTAPI_CONNECT_TIMEOUT_SECONDS: ${FASTAPI_CONNECT_TIMEOUT_SECONDS:-10}
      FASTAPI_READ_TIMEOUT_SECONDS: ${FASTAPI_READ_TIMEOUT_SECONDS:-30}
      FASTAPI_SERVICE_JWT_AUDIENCE: ${FASTAPI_SERVICE_JWT_AUDIENCE:-fastcheck-ai}
      FASTAPI_SERVICE_JWT_SECRET: ${FASTAPI_SERVICE_JWT_SECRET:?FASTAPI_SERVICE_JWT_SECRET must be set in .env}
      FASTAPI_SERVICE_JWT_TTL_MINUTES: ${FASTAPI_SERVICE_JWT_TTL_MINUTES:-10}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://efeatas.dev,https://www.efeatas.dev}
    volumes:
      - uploads_data:/data/uploads
    networks:
      - app-net

  fastapi:
    build: ./ai
    container_name: fastapi
    restart: unless-stopped
    environment:
      APP_ENV: ${AI_APP_ENV:-production}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY must be set in .env}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3.1-flash-lite-preview}
      LLM_REQUEST_TIMEOUT_SECONDS: ${LLM_REQUEST_TIMEOUT_SECONDS:-25}
      SERVICE_JWT_REQUIRED: ${SERVICE_JWT_REQUIRED:-true}
      SERVICE_JWT_ALGORITHMS: ${SERVICE_JWT_ALGORITHMS:-HS256}
      SERVICE_JWT_SECRET: ${FASTAPI_SERVICE_JWT_SECRET:?FASTAPI_SERVICE_JWT_SECRET must be set in .env}
      FASTAPI_SERVICE_JWT_SECRET: ${FASTAPI_SERVICE_JWT_SECRET:?FASTAPI_SERVICE_JWT_SECRET must be set in .env}
      SERVICE_JWT_ISSUER: ${APP_JWT_ISSUER:-fastcheck-spring}
      SERVICE_JWT_AUDIENCE: ${FASTAPI_SERVICE_JWT_AUDIENCE:-fastcheck-ai}
      IMAGE_FETCH_TIMEOUT_SECONDS: ${IMAGE_FETCH_TIMEOUT_SECONDS:-20}
      IMAGE_MAX_BYTES: ${IMAGE_MAX_BYTES:-12000000}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      springboot:
        condition: service_started
      fastapi:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
